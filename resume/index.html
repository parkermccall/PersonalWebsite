<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume — Parker McCall</title>
<meta name="description" content="Resume of Parker McCall — aerospace engineering student at NC State and propulsion engineer at Liquid Rocketry Lab.">
<link rel="icon" type="image/png" href="/favicon.png">
<style>
:root{--bg:#070707;--panel:#0d0d0d;--panel2:#101010;--line:#1c1c1a;--line2:#2a2a27;--ink:#f5f3ee;--dim:#8c8c84;--faint:#5e5e57;--hot:#ff6b35;--cool:#48cae4;--mono:ui-monospace,'Cascadia Mono','SF Mono',Menlo,monospace;--disp:'Helvetica Neue',Arial,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--disp);line-height:1.6;overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column}
a{color:inherit;text-decoration:none}
#flow{position:fixed;inset:0;z-index:-1;opacity:.7}
.wrap{max-width:1200px;margin:0 auto;padding:0 40px;width:100%}
nav{position:sticky;top:0;z-index:50;backdrop-filter:blur(10px);background:rgba(7,7,7,.7);border-bottom:1px solid var(--line)}
.nav-in{display:flex;align-items:center;justify-content:space-between;height:70px}
.logo{font-family:var(--mono);font-weight:700;letter-spacing:.18em;font-size:13px}
.nav-links{display:flex;gap:26px;font-family:var(--mono);font-size:12px;letter-spacing:.1em}
.nav-links a{color:var(--dim);transition:color .2s;position:relative;padding:4px 0}
.nav-links a:hover,.nav-links a.active{color:var(--ink)}
.nav-links a.active::after{content:'';position:absolute;bottom:-4px;left:0;width:100%;height:2px;background:var(--hot)}
.burger{display:none;font-family:var(--mono);color:var(--dim);background:none;border:1px solid var(--line2);padding:6px 12px;cursor:pointer;letter-spacing:.1em}
main{flex:1;padding:60px 0 80px}
.head{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:24px;margin-bottom:34px}
.eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.3em;color:var(--hot);margin-bottom:18px;text-transform:uppercase}
.head h1{font-size:clamp(40px,7vw,76px);font-weight:800;letter-spacing:-.04em;line-height:.92}
.head h1 .o{color:var(--hot)}
.actions{display:flex;border:1px solid var(--line2);width:fit-content}
.btn{font-family:var(--mono);font-size:12px;letter-spacing:.12em;padding:14px 26px;transition:.22s;display:inline-flex;align-items:center;gap:10px;text-transform:uppercase;cursor:pointer}
.btn.primary{background:var(--hot);color:#070707;font-weight:700}
.btn.primary:hover{background:#ff8455}
.btn.ghost{color:var(--ink);border-left:1px solid var(--line2)}
.btn.ghost:hover{background:var(--panel2);color:var(--hot)}
.viewer{border:1px solid var(--line2);background:var(--panel);position:relative;box-shadow:0 30px 80px -40px #000}
.viewer .bar{display:flex;align-items:center;gap:10px;padding:12px 18px;border-bottom:1px solid var(--line);font-family:var(--mono);font-size:11px;letter-spacing:.16em;color:var(--faint);text-transform:uppercase}
.viewer .dot{width:9px;height:9px;border-radius:50%;background:var(--line2)}
.viewer .dot.hot{background:var(--hot)}
.frame{width:100%;height:min(80vh,1100px);border:0;display:block;background:#1a1a1a}
.fallback{display:none;padding:60px 30px;text-align:center;font-family:var(--mono);font-size:13px;color:var(--dim);letter-spacing:.04em;line-height:1.9}
.fallback a{color:var(--hot)}
.nopdf .frame{display:none}
.nopdf .fallback{display:block}
footer{border-top:1px solid var(--line);padding:36px 0}
.foot-in{display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:11px;letter-spacing:.16em;color:var(--faint);flex-wrap:wrap;gap:16px}
.foot-in a:hover{color:var(--hot)}
.reveal{opacity:0;transform:translateY(24px);transition:.7s cubic-bezier(.2,.8,.2,1)}.reveal.in{opacity:1;transform:none}
@media(max-width:780px){.wrap{padding:0 22px}.nav-links{display:none}.burger{display:block}.nav-links.open{display:flex;position:absolute;top:70px;left:0;right:0;flex-direction:column;background:var(--panel);border-bottom:1px solid var(--line);padding:20px 22px;gap:18px}.head{align-items:flex-start}.actions{width:100%}.btn{flex:1;justify-content:center}.frame{height:78vh}}
</style>
</head>
<body>
<canvas id="flow"></canvas>
<nav><div class="wrap nav-in">
  <a href="/" class="logo">PARKER McCALL</a>
  <button class="burger" onclick="document.getElementById('nl').classList.toggle('open')">MENU</button>
  <div class="nav-links" id="nl">
    <a href="https://parkermccall.com">/home</a><a href="/resume/" class="active">/resume</a><a href="/projects/">/portfolio</a>
    <a href="https://www.aerrowlabs.com">/aerrowlabs</a><a href="/contact/">/contact</a>
  </div>
</div></nav>

<main><div class="wrap">
  <div class="head reveal">
    <div>
      <h1>My Resume.</h1>
    </div>
    <div class="actions">
      <a class="btn primary" href="/resume/ParkerMcCall-Resume.pdf" download>Download PDF ↓</a>
      <a class="btn ghost" href="/resume/ParkerMcCall-Resume.pdf" target="_blank" rel="noopener">Open in tab ↗</a>
    </div>
  </div>

  <div class="viewer reveal" id="viewer">
    <div class="bar"><span class="dot hot"></span><span class="dot"></span><span class="dot"></span>&nbsp;&nbsp;ParkerMcCall-Resume.pdf</div>
    <iframe class="frame" id="pdfframe" src="/resume/ParkerMcCall-Resume.pdf#view=FitH" title="Parker McCall Resume"></iframe>
    <div class="fallback">
      Your browser can't display the embedded PDF.<br>
      <a href="/resume/ParkerMcCall-Resume.pdf" target="_blank" rel="noopener">Open the resume in a new tab →</a>
    </div>
  </div>
</div></main>

<footer><div class="wrap foot-in">
  <span>© 2026 PARKER McCALL · NC STATE MAE</span>
  <span><a href="/">HOME</a> · <a href="/contact/">CONTACT</a></span>
</div></footer>

<script>
const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('in')}),{threshold:.08});
document.querySelectorAll('.reveal').forEach((el,i)=>{el.style.transitionDelay=(i%4*80)+'ms';io.observe(el)});

/* If the PDF fails to load (missing file / mobile blocks inline PDF), show fallback link */
(function(){
  const frame=document.getElementById('pdfframe'), viewer=document.getElementById('viewer');
  let loaded=false;
  frame.addEventListener('load',()=>{loaded=true;});
  setTimeout(()=>{ if(!loaded) viewer.classList.add('nopdf'); },2500);
})();

/* ===== Schlieren flow-field background (subtle, behind content) ===== */
(function(){
  const c=document.getElementById('flow'); if(!c) return;
  const x=c.getContext('2d'); let W,H,P=[];
  function size(){
    const dpr=Math.min(window.devicePixelRatio||1,2);
    W=innerWidth;H=innerHeight;
    c.width=W*dpr;c.height=H*dpr;c.style.width=W+'px';c.style.height=H+'px';
    x.setTransform(dpr,0,0,dpr,0,0);
  }
  size();addEventListener('resize',size);
  const COUNT=innerWidth<700?55:110;
  for(let i=0;i<COUNT;i++)P.push({x:Math.random()*W,y:Math.random()*H,s:.4+Math.random()*1.5,o:.06+Math.random()*.20});
  function noise(y){return Math.sin(y*0.012)*1.4}
  (function frame(){
    x.fillStyle='rgba(7,7,7,0.16)';x.fillRect(0,0,W,H);
    for(const p of P){
      const v=2.0*p.s+noise(p.y);
      p.x+=v;p.y+=Math.sin((p.x+p.y)*0.004)*0.5;
      if(p.x>W+20){p.x=-20;p.y=Math.random()*H}
      x.strokeStyle=p.s>1.0?'rgba(255,107,53,'+p.o+')':'rgba(72,202,228,'+(p.o*.85)+')';
      x.lineWidth=p.s;
      x.beginPath();x.moveTo(p.x,p.y);x.lineTo(p.x-v*5,p.y-Math.sin((p.x+p.y)*0.004)*2.6);x.stroke();
    }
    requestAnimationFrame(frame);
  })();
})();
</script>
</body>
</html>
