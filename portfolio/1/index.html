<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>01 — HTP / Jet-A Bipropellant Test Stand · Parker McCall</title>
<link rel="icon" type="image/png" href="/favicon.png">
<style>
:root{--bg:#070707;--panel:#0d0d0d;--panel2:#101010;--line:#1c1c1a;--line2:#2a2a27;--ink:#f5f3ee;--dim:#8c8c84;--faint:#5e5e57;--hot:#ff6b35;--cool:#48cae4;--mono:ui-monospace,'Cascadia Mono','SF Mono',Menlo,monospace;--disp:'Helvetica Neue',Arial,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--disp);line-height:1.6;overflow-x:hidden}
a{color:inherit;text-decoration:none}
#flow{position:fixed;inset:0;z-index:-1;opacity:.7}
.wrap{max-width:1200px;margin:0 auto;padding:0 40px;width:100%}
nav{position:sticky;top:0;z-index:50;backdrop-filter:blur(10px);background:rgba(7,7,7,.7);border-bottom:1px solid var(--line)}
.nav-in{display:flex;align-items:center;justify-content:space-between;height:70px}
.logo{font-family:var(--mono);font-weight:700;letter-spacing:.18em;font-size:13px}
.nav-links{display:flex;gap:26px;font-family:var(--mono);font-size:12px;letter-spacing:.1em}
.nav-links a{color:var(--dim);transition:color .2s;position:relative;padding:4px 0}
.nav-links a:hover,.nav-links a.active{color:var(--ink)}
.nav-links a:hover::after,.nav-links a.active::after{content:'';position:absolute;bottom:-4px;left:0;width:100%;height:2px;background:var(--hot)}
.burger{display:none;font-family:var(--mono);color:var(--dim);background:none;border:1px solid var(--line2);padding:6px 12px;cursor:pointer;letter-spacing:.1em}
.phead{padding:70px 0 50px}
.back{font-family:var(--mono);font-size:12px;letter-spacing:.1em;color:var(--faint);transition:.2s;display:inline-flex;align-items:center;gap:8px;margin-bottom:32px}
.back:hover{color:var(--hot)}
.proj-cat{font-family:var(--mono);font-size:11px;letter-spacing:.26em;color:var(--hot);text-transform:uppercase;margin-bottom:16px}
.phead h1{font-size:clamp(32px,5.5vw,72px);font-weight:800;letter-spacing:-.04em;line-height:.92}
.gallery{margin-bottom:60px}
.gallery-grid{display:grid;grid-template-columns:1.4fr 1fr;grid-template-rows:1fr 1fr;gap:4px;height:520px}
/* Changed background to match the light grey SolidWorks workspace environment */
.img-slot{background:#e9ecf1;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:var(--faint);font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;padding:16px;position:relative;overflow:hidden;text-align:center}
/* Changed object-fit from cover to contain so CAD files scale fully without clipping */
.img-slot img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;display:block}
